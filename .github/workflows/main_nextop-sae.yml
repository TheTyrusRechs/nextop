# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - nextop-sae

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: nextopacr.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_38996E699B394A87B37863724BA53BFC }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_AD7AD9E149694E68BB8157478918E8C5 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: nextopacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_38996E699B394A87B37863724BA53BFC }}/nextopacr/nextop:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BBBBE4328A6C482DAD6DA168DBDD1461 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F636176623614B55A603D663699229FC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B73D87A2B1E24533931CEC49692AD7FB }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'nextop-sae'
          slot-name: 'Production'
          images: 'nextopacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_38996E699B394A87B37863724BA53BFC }}/nextopacr/nextop:${{ github.sha }}'
          